services: 
  database:
    image: postgres:alpine
    container_name: postgres-db
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"] 
      interval: 10s 
      timeout: 5s 
      retries: 5 
      start_period: 30s 
    restart: always
    networks:
      - network

  api-python:
    container_name: backend-python
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    #healthcheck:
     # test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/health"]
      #interval: 30s
      #timeout: 10s
      #retries: 3
    networks:
     - network

  nginx:
    image: nginx:alpine
    container_name: nginx-serve
    ports:
      - "8080:80"
    depends_on:
      database:
        condition: service_healthy
    #  api-python:
     #   condition: service_healthy
    healthcheck: 
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"] 
      interval: 30s 
      timeout: 10s 
      retries: 3 
    restart: always
    networks:
      - network

networks: 
  network: 
    driver: bridge 

volumes:
  db-data: